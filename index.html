<!DOCTYPE html>

<head>

    <title>ENGL102 Resources - Prof. Jerred</title>
    <!-- Load Tailwind CSS for styling -->

<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex items-center justify-center p-4">

        <!-- Header / Icon -->
        <div class="space-y-4">
            <div class="w-16 h-16 bg-blue-600 text-white rounded-2xl mx-auto flex items-center justify-center shadow-md">

                    <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                    <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>

            </div>

        </div>

        <!-- Links Section -->
        <div class="pt-4 border-t border-slate-100">
            <p class="text-sm text-slate-600 mb-4">Select a tool below to practice for this week's module:</p>
            
            <!-- Link to the Sandbox App -->
            <a href="https://bertjerred.github.io/bsc-experiments/Verb%20Tense%20and%20Sentence%20Types.html"

                Module 2: Grammar Sandbox
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="group-hover:translate-x-1 transition-transform">
                    <path d="M5 12h14"/>
                    <path d="m12 5 7 7-7 7"/>

            </a>
        </div>

        <!-- Footer -->
        <div class="pt-6">
            <p class="text-xs text-slate-400 uppercase tracking-widest font-semibold">
                Research & Writing for the Workplace
            </p>
        </div>

    </div>

</html>
